rbac_and_access_control:
  name: rbac and access control
  requirements:
    - Restrict cluster-admin role usage to only necessary accounts
    - Avoid excessive use of cluster-admin privileges
    - Limit create-pods permission to smallest possible group
    - Enforce least privilege for Kubernetes RBAC users
    - Use dedicated administrative accounts for elevated access
    - Use AWS IAM Authenticator with RBAC integration

authentication_and_service_accounts:
  name: authentication and service accounts
  requirements:
    - Prefer dedicated EKS service accounts
    - Limit service account token usage
    - Ensure service account access is explicitly controlled

kubelet_security:
  name: kubelet security
  requirements:
    - Ensure kubelet configuration file ownership is root:root
    - Ensure kubelet configuration file permissions are 644 or more restrictive
    - Ensure Anonymous Auth is disabled
    - Ensure --authorization-mode is not AlwaysAllow
    - Ensure --read-only-port is disabled
    - Ensure --streaming-connection-idle-timeout is configured
    - Ensure --rotate-certificates is enabled
    - Ensure eventRecordQPS is appropriately configured
    - Ensure kubelet authentication uses certificates

network_security:
  name: network security
  requirements:
    - Ensure Network Policies are enabled and enforced
    - Ensure CNI plugin supports network policies (vpc-cni)
    - Disable public IP addresses for cluster nodes
    - Ensure cluster uses private networking where possible
    - Restrict API server access to internal networks only
    - Ensure control plane endpoint access is restricted

eks_cluster_security:
  name: eks cluster security
  requirements:
    - Ensure clusters are created with private endpoint enabled
    - Ensure public endpoint access is disabled where required
    - Ensure clusters are created with private nodes enabled
    - Configure cluster logging for audit requirements
    - Use AWS EKS best practices for networking and IAM

image_registry_security:
  name: image registry security
  requirements:
    - Minimize container registries to only approved sources
    - Restrict Amazon ECR access to read-only where possible
    - Ensure secure access to ECR using IAM roles
    - Apply least privilege IAM policies for image scanning

secrets_and_encryption:
  name: secrets and encryption
  requirements:
    - Ensure Kubernetes Secrets are encrypted using AWS KMS CMKs
    - Enable Secrets Encryption at rest
    - Encrypt sensitive data at rest using secure tools
    - Encrypt sensitive data in transit using TLS or SSH
    - Ensure credential storage is protected

vulnerability_management:
  name: vulnerability management
  requirements:
    - Conduct authenticated and unauthenticated vulnerability scans
    - Use SCAP-compliant vulnerability scanning tools
    - Perform regular (weekly or more frequent) vulnerability scanning
    - Ensure image scanning is performed before deployment

audit_and_logging:
  name: audit and logging
  requirements:
    - Enable cluster-wide audit logging
    - Ensure audit logs are managed according to enterprise policy
    - Maintain centralized audit log management process
    - Ensure logging is enabled for all cluster components

policy_enforcement:
  name: policy enforcement
  requirements:
    - Apply Network Policies for workload isolation
    - Restrict hostNetwork usage in workloads
    - Enforce Pod security controls where applicable
    - Ensure admission control policies are enforced

cluster_hardening:
  name: cluster hardening
  requirements:
    - Disable public IP assignment for nodes
    - Ensure secure cluster baseline configuration
    - Maintain hardened Kubernetes configuration standards
    - Ensure only required system components have elevated permissions

container_security:
  name: container security
  requirements:
    - Prevent containers from running with host-root access
    - Restrict privileged container execution
    - Prevent containers from accessing host resources unnecessarily
    - Enforce secure container runtime configurations

iam_and_permissions:
  name: iam and permissions
  requirements:
    - Use least privilege IAM policies for EKS and ECR
    - Ensure node IAM roles are restricted to required permissions only
    - Configure storage access roles with read-only permissions where possible

operational_security:
  name: operational security
  requirements:
    - Ensure logging and audit processes are enabled across all assets
    - Ensure vulnerability scanning is integrated into operations
    - Ensure secure configuration processes are maintained

network_policy_and_cni:
  name: network policy and cni
  requirements:
    - Ensure vpc-cni supports Network Policy enforcement
    - Enable and configure Kubernetes Network Policies
    - Ensure cluster networking is properly segmented

api_server_security:
  name: api server security
  requirements:
    - Restrict API server access to private networks when possible
    - Ensure external access to control plane is restricted
    - Secure API authentication and authorization mechanisms