access_control:
  name: access control
  requirements:
    - Establish dedicated administrative computing resources (physically or logically separated)
    - Enforce least privilege access based on job responsibilities
    - Protect information using access control lists (ACLs)
    - Ensure only authorized users can access sensitive systems
    - Disable dormant accounts after 45 days of inactivity
    - Protect information stored in systems using ACLs, network shares, and applications

rbac_and_authorization:
  name: rbac and authorization
  requirements:
    - Minimize wildcard permissions in Roles and ClusterRoles
    - Minimize access to create pods
    - Avoid granting impersonate, bind, or escalate permissions unless required
    - Avoid AlwaysAllow authorization mode
    - Enforce role-based access control policies
    - Use admission control policies for enforcement

kubelet_security:
  name: kubelet security
  requirements:
    - Ensure kubelet client certificate rotation is enabled
    - Ensure kubelet configuration file ownership is root:root
    - Ensure kubelet configuration file permissions are 644 or stricter
    - Ensure Anonymous Auth is disabled
    - Ensure --authorization-mode is not AlwaysAllow
    - Ensure --read-only-port is disabled
    - Ensure --protect-kernel-defaults is enabled
    - Ensure --make-iptables-util-chains is enabled
    - Ensure --hostname-override is not set
    - Ensure --eventRecordQPS is configured appropriately
    - Restart kubelet service when configuration changes occur

container_security:
  name: container security
  requirements:
    - Minimize admission of privileged containers
    - Minimize allowPrivilegeEscalation
    - Minimize root containers
    - Minimize containers sharing host network namespace
    - Minimize containers sharing host IPC namespace
    - Minimize containers sharing host PID namespace
    - Minimize containers with added capabilities
    - Ensure non-root container execution policies
    - Apply PodSecurityPolicy or equivalent admission controls
    - Restrict volume usage in containers

network_security:
  name: network security
  requirements:
    - Ensure Network Policies are enabled and enforced
    - Ensure CNI plugin supports network policies
    - Ensure all namespaces have Network Policies defined
    - Restrict cluster endpoint access (prefer private endpoint)
    - Disable public cluster endpoint where possible
    - Apply CIDR-based access restrictions to cluster endpoint
    - Enforce network-based URL filtering for enterprise assets

secrets_management:
  name: secrets management
  requirements:
    - Minimize access to Kubernetes Secrets
    - Ensure Kubernetes Secrets are encrypted using AWS KMS CMKs
    - Enable Secrets Encryption at rest
    - Prefer external secret storage solutions
    - Avoid embedding secrets in environment variables

image_and_registry_security:
  name: image and registry security
  requirements:
    - Minimize container registries to approved sources only
    - Enable image vulnerability scanning before deployment
    - Restrict ECR access to required permissions only
    - Ensure images are scanned using AWS ECR or third-party tools

encryption_security:
  name: encryption security
  requirements:
    - Encrypt sensitive data in transit
    - Use TLS for all HTTPS load balancers
    - Ensure transport layer encryption is enforced (TLS/SSH)
    - Encrypt sensitive data at rest using server-side encryption
    - Apply encryption to databases, applications, and storage systems

system_hardening:
  name: system hardening
  requirements:
    - Use container-optimized OS for workloads
    - Maintain hardened OS baselines
    - Use secure configuration processes for all systems
    - Perform regular configuration reviews and updates

eks_security:
  name: eks security
  requirements:
    - Ensure clusters are created with private endpoint enabled
    - Disable public endpoint access where possible
    - Enable private nodes for workloads
    - Use IAM roles for service accounts (IRSA)
    - Follow AWS EKS security best practices

monitoring_and_audit:
  name: monitoring and audit
  requirements:
    - Enable audit logging for Kubernetes
    - Collect logs including user, event source, timestamps, and actions
    - Maintain audit log management process
    - Use kubelet and control plane monitoring

configuration_management:
  name: configuration management
  requirements:
    - Maintain secure configuration standards
    - Establish configuration governance process
    - Use structured remediation and audit processes
    - Maintain baseline configuration documentation

policy_enforcement:
  name: policy enforcement
  requirements:
    - Use PodSecurityPolicy or equivalent admission controls
    - Enforce admission control policies
    - Apply automated compliance checks
    - Ensure consistent policy enforcement across namespaces

image_scanning_process:
  name: image scanning process
  requirements:
    - Perform manual or automated image scanning using AWS Management Console or CI tools
    - Ensure vulnerability scanning is part of deployment pipeline

kubelet_operations:
  name: kubelet operations
  requirements:
    - Restart kubelet service using systemctl when required
    - Use systemctl daemon-reload for configuration changes
    - Monitor kubelet status after changes