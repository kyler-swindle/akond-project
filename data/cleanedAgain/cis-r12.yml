kubernetes_security_baseline:
  name: kubernetes security baseline
  requirements:
    - Kubernetes provides a default namespace where objects are placed if none is specified
    - Prefer using secrets as files over secrets as environment variables
    - Container-optimized OS
    - MakeIPTablesUtilChains: true
    - Kubernetes support
    - Configure kubelet service to restart
    - Secure container footprint
    - Establish secure configurations
    - Check status of kubelet
    - streamingConnectionIdleTimeout: 4h0m0s
    - Encrypt sensitive data in transit
    - Ensure image vulnerability scanning using Amazon ECR or third-party provider
    - PodSecurityPolicy
    - Image registry and image scanning
    - Hardened OS
    - See Amazon EKS documentation for default values
    - Remove system:masters group from all users in cluster
    - Consider external secret storage
    - Minimal setup
    - Default namespace should not be used
    - Audit kubelet configuration
    - Extract live configuration from nodes
    - Maintain documented standard security configuration standards
    - Reliance on authentication

network_security:
  name: network security
  requirements:
    - Network segmentation ensures containers communicate only with allowed endpoints
    - NetworkPolicy defines allowed pod communication rules
    - Pods reject connections not allowed by Network Policies
    - Unselected pods continue to accept all traffic

control_plane_security:
  name: control plane security
  requirements:
    - Control plane security is shared responsibility between AWS and customer
    - AWS secures control plane nodes and etcd
    - Security of the cloud vs security in the cloud model applies

documentation_and_governance:
  name: documentation and governance
  requirements:
    - Establish and maintain secure configuration process
    - Review and update documentation regularly
    - Maintain documented security configuration standards
    - Profile applicability must be defined


security_compliance_and_hardening:
  name: security compliance and hardening
  requirements:
    - Establish secure configurations for enterprise assets and software
    - Ensure secure configuration processes are maintained
    - Harden OS environments
    - Secure Kubernetes worker node components
    - Ensure kubelet configuration is audited

configuration_fragments:
  name: configuration fragments
  requirements:
    - MakeIPTablesUtilChains enabled
    - streamingConnectionIdleTimeout set to 4h0m0s
    - PodSecurityPolicy enabled