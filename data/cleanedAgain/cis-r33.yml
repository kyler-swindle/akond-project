secrets_management:
  name: secrets management
  requirements:
    - Enable Secrets Encryption during Amazon EKS cluster creation
    - Prefer mounted secret files over environment variables
    - Apply data access controls (ACLs) for files, databases, and applications
    - Ensure secure handling of Kubernetes Secrets

kubelet_security:
  name: kubelet security
  requirements:
    - Enable RotateKubeletServerCertificate
    - Ensure kubelet authentication uses certificates
    - Ensure Anonymous Auth is disabled
    - Ensure --authorization-mode is properly configured
    - Ensure --read-only-port is disabled
    - Ensure --streaming-connection-idle-timeout is configured
    - Ensure --make-iptables-util-chains is enabled
    - Ensure --eventRecordQPS is properly configured

rbac_and_privilege_control:
  name: rbac and privilege control
  requirements:
    - Avoid use of cluster-admin unless strictly required
    - Prevent privilege escalation in containers
    - Restrict elevated rights and escalation paths
    - Apply least privilege access for all roles

container_admission_security:
  name: container admission security
  requirements:
    - Do not allow containers to share host network namespace
    - Do not allow containers to share host process ID namespace
    - Do not allow containers to share host IPC namespace
    - Restrict hostNetwork usage in workloads
    - Enforce Pod Security Admission policies

network_security:
  name: network security
  requirements:
    - Use private endpoint access for control plane
    - Disable public IP assignment for worker nodes
    - Configure allowed CIDR blocks for API access
    - Restrict internet access where not required
    - Ensure secure API server access configuration

authentication_and_authorization:
  name: authentication and authorization
  requirements:
    - Use TLS for secure communication
    - Enable kubelet certificate authentication
    - Ensure proper API server authentication controls
    - Ensure proper authorization policies are enforced

cluster_security:
  name: cluster security
  requirements:
    - The default namespace should not be used for workloads
    - Maintain secure cluster configuration baselines
    - Ensure cluster security settings align with best practices
    - Apply secure configuration standards at cluster creation

operational_security:
  name: operational security
  requirements:
    - Monitor OS and application vulnerabilities continuously
    - Apply security patches promptly
    - Use endpoint protection (EDR/AV solutions)
    - Log and monitor system and user activity

image_and_os_security:
  name: image and OS security
  requirements:
    - Use container-optimized operating systems where possible
    - Maintain secure system images aligned with organizational standards
    - Keep base operating systems hardened and patched

policy_and_access_control:
  name: policy and access control
  requirements:
    - Apply Kubernetes Pod Security Admission policies
    - Enforce workload security constraints via admission control
    - Restrict API server access based on policy
    - Ensure proper workload isolation policies are applied

api_security:
  name: api security
  requirements:
    - Restrict API server access appropriately
    - Enforce secure AWS API request handling
    - Apply least privilege to API interactions

general_security_baseline:
  name: general security baseline
  requirements:
    - Ensure secure configuration practices across all systems
    - Apply organizational approved configuration standards
    - Maintain secure templates for all infrastructure components