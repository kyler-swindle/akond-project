kubelet_configuration_security:
  name: kubelet configuration security
  requirements:
    - Ensure kubeconfig file permissions are 644 or more restrictive
    - Ensure kubelet kubeconfig file ownership is root:root
    - Ensure kubelet configuration file permissions are 644 or more restrictive
    - Ensure kubelet configuration file ownership is root:root
    - Enable RotateKubeletServerCertificate
    - Ensure kubelet server certificate rotation is enabled

container_admission_security:
  name: container admission security
  requirements:
    - Do not allow privileged containers
    - Do not allow root containers
    - Do not allow containers with added capabilities
    - Do not allow containers with capability escalation
    - Do not allow containers to share host network namespace
    - Do not allow containers to share host process namespace
    - Do not allow containers to share host IPC namespace
    - Restrict pod creation access for system components only
    - The default namespace should not be used
    - Apply hostNetwork restrictions for all workload namespaces

network_security:
  name: network security
  requirements:
    - Ensure Network Policies restrict pod-to-pod communication
    - Ensure cluster control plane access is restricted via allowlisted networks
    - Prevent unintended blocking of external access to control plane
    - By default, pod-to-pod traffic is unrestricted unless policies are applied

authentication_and_authorization:
  name: authentication and authorization
  requirements:
    - Use explicit service accounts for workloads
    - Disable automountServiceAccountToken when not required
    - Ensure proper kubelet authentication configuration
    - Avoid insecure default authentication behavior

audit_and_monitoring:
  name: audit and monitoring
  requirements:
    - Monitor excessive event generation in cluster logs
    - Ensure cluster logging is enabled and properly configured
    - Maintain audit logging for Kubernetes components

cluster_security:
  name: cluster security
  requirements:
    - Apply consistent cluster security configuration across environments
    - Ensure control plane security settings are enforced
    - Maintain secure baseline configuration for EKS clusters

configuration_management:
  name: configuration management
  requirements:
    - Ensure kubelet configuration ownership is root:root
    - Maintain secure configuration baselines for Kubernetes components
    - Ensure configuration files are validated and managed consistently

policy_enforcement:
  name: policy enforcement
  requirements:
    - Apply policies restricting hostNetwork usage per namespace
    - Enforce admission control policies for workload isolation
    - Ensure security policies are applied consistently across namespaces

network_access_control:
  name: network access control
  requirements:
    - Use allowlisted networks for control plane access
    - Ensure secure network communication protocols are used
    - Use secure communication standards such as TLS and WPA2 Enterprise

eks_configuration_security:
  name: eks configuration security
  requirements:
    - Ensure EKS cluster logging is enabled
    - Ensure logging configuration is consistently applied
    - Ensure EKS configuration management follows security baseline standards

remediation_process:
  name: remediation process
  requirements:
    - Apply structured remediation for security misconfigurations
    - Ensure remediation actions are documented and repeatable

security_baseline_general:
  name: security baseline general
  requirements:
    - Ensure security configurations are applied at appropriate levels
    - Maintain secure defaults across Kubernetes workloads